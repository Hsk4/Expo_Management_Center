name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]


jobs:
  build-and-push:
    # Use the latest Ubuntu machine provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repo code onto the runner machine
       - name: Checkout code
         uses: actions/checkout@v3
         
       # Step 2: Login to Docker hub using github secrets  
       - name: Login to Docker hub
         uses: docker/login-action@v3
         with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

         
       # Step 3: Build and push backend Docker image and push to Docker Hub
       - name: Build and push backend
         uses: docker/build-push-action@v5
         with:
            context: .
            dockerfile: Dockerfile
            push: true
            tags: ${{secrets.DOCKER_USERNAME}}/expo-backend:latest
       # Step 4: Build the frontend docker image and push to Docker Hub
       - name: Build and push frontend
         uses: docker/build-push-action@v5
         with:
          context: ./Client
          dockerfile: Client/Dockerfile
          push: true
          tags: ${{secrets.DOCKER_USERNAME}}/expo-frontend:latest
        

