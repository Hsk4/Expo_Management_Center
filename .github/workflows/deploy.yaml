name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repo code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub using github secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the backend Docker image and push to Docker Hub
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expo-backend:latest

      # Step 4: Build the frontend Docker image and push to Docker Hub
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Client
          file: ./Client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/expo-frontend:latest